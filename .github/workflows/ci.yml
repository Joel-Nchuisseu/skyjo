name: CI Skyjo

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # Checkstyle
  validate-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
      - name: Checkstyle
        run: mvn validate -B

  # Compilation
  compile-job:
    runs-on: ubuntu-latest
    needs: validate-job
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
      - name: Compilation
        run: mvn compile -Dcheckstyle.skip=true -B

  # Tests et vérification
  testsAndVerify-job:
    runs-on: ubuntu-latest
    needs: compile-job
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
      - name: Tests et vérification
        run: mvn verify -Pnomutation -Dcheckstyle.skip=true -Dmaven.javadoc.skip=true -Djacoco.skip=true -B

  # Package et déploiement GitHub Pages
  pages:
    runs-on: ubuntu-latest
    needs: testsAndVerify-job
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
      - name: Package et génération Javadoc
        run: mvn clean package -Dcheckstyle.skip=true -DskipTests -Djacoco.skip=true -B
      - name: Préparer les artifacts
        run: |
          mkdir -p public/javadoc
          mkdir -p public/download
          cp -r target/apidocs/* public/javadoc/
          cp target/Skyjo-jar-with-dependencies.jar public/download/Skyjo.jar
          cp index.html public/index.html
      - name: Publier sur GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public

